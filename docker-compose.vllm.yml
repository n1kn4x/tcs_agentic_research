services:
  deep-reasoner:
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${DEEP_GPUS:-0,1,2,3}
    command:
      - --model
      - ${DEEP_MODEL:-Qwen/Qwen3.6-35B-A3B}
      - --served-model-name
      - deep-reasoner
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${DEEP_TP:-4}
      - --max-model-len
      - ${DEEP_MAX_MODEL_LEN:-262144}
      - --gpu-memory-utilization
      - ${DEEP_GPU_MEMORY_UTILIZATION:-0.88}
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${DEEP_TOOL_CALL_PARSER:-qwen3_coder}
      - --language-model-only
      - --default-chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":true}'

  routine-extractor:
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - "8001:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${ROUTINE_GPUS:-4}
    command:
      - --model
      - ${ROUTINE_MODEL:-Qwen/Qwen3-8B}
      - --served-model-name
      - routine-extractor
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${ROUTINE_TP:-1}
      - --max-model-len
      - ${ROUTINE_MAX_MODEL_LEN:-32768}
      - --gpu-memory-utilization
      - ${ROUTINE_GPU_MEMORY_UTILIZATION:-0.85}
      - --default-chat-template-kwargs
      - '{"enable_thinking":false}'
