services:
  qwen-research:
    image: vllm/vllm-openai:latest
    ipc: host
    ports:
      - "${QWEN_PORT:-8000}:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${QWEN_GPUS:-0,1,2,3}
    command:
      - --model
      - ${QWEN_MODEL:-Qwen/Qwen3.6-35B-A3B}
      - --served-model-name
      - ${QWEN_SERVED_MODEL_NAME:-qwen-research}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${QWEN_TP:-4}
      - --max-model-len
      - ${QWEN_MAX_MODEL_LEN:-32768}
      - --gpu-memory-utilization
      - ${QWEN_GPU_MEMORY_UTILIZATION:-0.88}
      - --reasoning-parser
      - qwen3
      - --language-model-only
      - --default-chat-template-kwargs
      - '{"enable_thinking":true,"preserve_thinking":false}'
