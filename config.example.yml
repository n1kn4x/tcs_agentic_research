# Copy to config.yml and edit model names/endpoints for your local vLLM servers.
# vLLM exposes an OpenAI-compatible API at http://host:port/v1.
experimenter:
  enabled: true
  image: tcs-agentic-research-experimenter:latest
  # Empty means: use the Dockerfile shipped in src/tcs_agentic_research/experimenter/Dockerfile.
  dockerfile: ""
  network: bridge
  memory: 8g
  cpus: 4
  timeout_seconds: 1800
  max_output_bytes: 2000000
  add_host_gateway: true
  environment: {}
  pi:
    provider: experimenter-vllm
    model: deep-reasoner
    base_url: http://host.docker.internal:8000/v1
    api_key: EMPTY
    api: openai-completions
    thinking: high
    reasoning: true
    context_window: 128000
    max_tokens: 32768
    provider_capabilities:
      supportsDeveloperRole: false
      supportsReasoningEffort: false

router:
  default_task: routine
  timeout_seconds: 600
  max_retries: 2
  profiles:
    deep-tools:
      model: deep-reasoner
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.0
      max_tokens: 32768
      supports_tools: true
      extra_body:
        top_p: 1.0
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.02
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false
      task_types:
        - proposal_generation
        - research_execution

    verifier:
      model: deep-reasoner
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.0
      max_tokens: 32768
      supports_tools: false
      extra_body:
        top_p: 1.0
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
      task_types:
        - proposal_critique
        - independent_replication

    proof:
      model: lean-prover
      base_url: http://localhost:8003/v1
      api_key: EMPTY
      temperature: 0.0
      max_tokens: 24576
      supports_tools: false
      extra_body:
        top_p: 1.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
      task_types:
        - theorem_proving

    routine:
      model: routine-extractor
      base_url: http://localhost:8001/v1
      api_key: EMPTY
      temperature: 0.0
      max_tokens: 8192
      supports_tools: false
      extra_body:
        top_p: 1.0
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
      task_types:
        - literature_extraction
        - structured_finalization
