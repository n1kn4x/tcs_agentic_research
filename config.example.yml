# Copy to config.yml and edit model names/endpoints for your local vLLM servers.
# vLLM exposes an OpenAI-compatible API at http://host:port/v1.
router:
  default_task: routine
  timeout_seconds: 180
  max_retries: 2
  profiles:
    deep:
      model: deep-reasoner
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.2
      max_tokens: 8192
      task_types:
        - initialization
        - initialization_interview
        - proposal_generation
        - proposal_critique
        - research_execution
        - research_critique
        - theorem_proving
        - solved_check
        - independent_replication
    routine:
      model: routine-extractor
      base_url: http://localhost:8001/v1
      api_key: EMPTY
      temperature: 0.0
      max_tokens: 4096
      task_types:
        - formatting
        - extraction
        - summarization
        - classification
        - literature_extraction
