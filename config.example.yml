# One shared Qwen3.6 endpoint serves every agent profile on GPUs 0-3.
# Profiles differ only in sampling, output budget, and thinking mode.
core:
  # The kernel only bounds one subsystem-owned atomic action and the shared memory view.
  max_model_calls_per_action: 128
  record_context_limit: 80
  literature_max_imports: 2

# One invocation may run for hours; every accepted node and failed attempt is persisted and the
# same theorem resumes from LeanProject/LEAP/state.sqlite on the next invocation.
leap:
  max_model_calls_per_run: 64
  direct_attempts_per_node: 2
  direct_revisions: 5
  blueprint_attempts_per_node: 3
  sketch_revisions: 4
  max_depth: 20
  max_nodes: 500
  max_children: 6
  max_wall_seconds: 21600
  compiler_timeout_seconds: 300
  compiler_memory_mb: 16384
  reviewer_min_score: 0.55

router:
  default_profile: reasoning
  repair_profile: format
  timeout_seconds: 600
  max_input_chars: 50000
  max_output_tokens: 12288
  repair_attempts: 1
  profiles:
    reasoning:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.6
      max_tokens: 12288
      task_types:
        - theory_decision
        - theory_investigation
        - literature_decision
        - proof_planning
        - blueprint_generation
        - decomposition_review
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false

    control:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.1
      max_tokens: 4096
      task_types:
        - proof_formulation
        - experiment_design
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false

    coding:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.1
      max_tokens: 12288
      task_types:
        - experiment_implementation
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false

    format:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.1
      max_tokens: 8192
      task_types:
        - literature_extraction
      extra_body:
        top_p: 0.8
        top_k: 20
        min_p: 0.0
        # Qwen notes that high presence penalties can cause language mixing.
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false

    proof:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.6
      max_tokens: 8192
      task_types:
        - theorem_proving
        - proof_revision
        - sketch_generation
        - sketch_revision
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false

# Experiments execute one generated Python program in a resource-bounded container.
# There is no nested tool-calling coding agent.
experimenter:
  enabled: true
  image: tcs-agentic-research-experimenter:v2
  dockerfile: ""
  network: none
  memory: 4g
  cpus: 2
  timeout_seconds: 600
  max_output_bytes: 500000
  add_host_gateway: false
  environment: {}
