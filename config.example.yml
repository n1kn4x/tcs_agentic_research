# Copy to config.yml and edit model names/endpoints for your local vLLM servers.
# vLLM exposes an OpenAI-compatible API at http://host:port/v1.
#
# The deep profile assumes Qwen/Qwen3.6-35B-A3B is served as `deep-reasoner`
# with `--reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder`.
# Qwen3.6 thinks by default. Deep/precise profiles enable thinking and preserve
# historical thinking when present; routine extraction uses non-thinking mode.
experimenter:
  enabled: true
  image: tcs-agentic-research-experimenter:latest
  # Empty means: use the Dockerfile shipped in src/tcs_agentic_research/experimenter/Dockerfile.
  dockerfile: ""
  network: bridge
  memory: 8g
  cpus: 4
  timeout_seconds: 1800
  max_output_bytes: 2000000
  add_host_gateway: true
  environment: {}
  pi:
    provider: experimenter-vllm
    model: deep-reasoner
    base_url: http://host.docker.internal:8000/v1
    api_key: EMPTY
    api: openai-completions
    thinking: high
    reasoning: true
    context_window: 128000
    max_tokens: 32768
    compat:
      supportsDeveloperRole: false
      supportsReasoningEffort: false

router:
  default_task: routine
  timeout_seconds: 600
  max_retries: 2
  profiles:
    deep-think-tools:
      model: deep-reasoner
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 1.0
      max_tokens: 32768
      supports_tools: true
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 1.5
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
      task_types:
        - proposal_generation
        - research_execution

    deep:
      model: deep-reasoner
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 1.0
      max_tokens: 32768
      supports_tools: false
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 1.5
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
      task_types:
        - initialization
        - initialization_interview
        - obstruction_search

    precise:
      model: deep-reasoner
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      # Qwen3.6 thinking mode for precise Lean/code-generation style tasks.
      temperature: 0.6
      max_tokens: 32768
      supports_tools: false
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
      task_types:
        - theorem_proving

    routine:
      model: routine-extractor
      base_url: http://localhost:8001/v1
      api_key: EMPTY
      temperature: 0.7
      max_tokens: 8192
      supports_tools: false
      extra_body:
        top_p: 0.80
        top_k: 20
        min_p: 0.0
        presence_penalty: 1.5
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
      task_types:
        - formatting
        - extraction
        - summarization
        - classification
        - literature_extraction
