# One shared Qwen3.6 endpoint serves every agent profile on GPUs 0-3.
# Profiles differ only in sampling, output budget, and thinking mode.
core:
  # Protocol/design/review/code/evidence are separate calls; all are still fresh and bounded.
  max_model_calls_per_step: 12
  max_plan_items: 4
  # This triggers method/question diversification. It does not stop while untried gaps remain.
  max_no_progress_steps: 4
  max_operational_retries: 2
  # Consecutive retries per identical defect; the pipeline also rejects no-op repairs.
  max_experiment_engineering_retries: 4
  max_strategy_revisions: 2
  max_method_attempts_per_requirement: 4
  literature_max_imports: 3
  literature_import_attempts: 8
  literature_results_per_query: 5

# One invocation may run for hours; every accepted node and failed attempt is persisted and the
# same theorem resumes from LeanProject/LEAP/state.sqlite on the next invocation.
leap:
  max_model_calls_per_run: 64
  direct_attempts_per_node: 2
  direct_revisions: 5
  blueprint_attempts_per_node: 3
  sketch_revisions: 4
  max_depth: 20
  max_nodes: 500
  max_children: 6
  max_wall_seconds: 21600
  compiler_timeout_seconds: 300
  compiler_memory_mb: 16384
  reviewer_min_score: 0.55

router:
  default_profile: reasoning
  repair_profile: format
  timeout_seconds: 600
  max_input_chars: 30000
  max_output_tokens: 12288
  repair_attempts: 1
  profiles:
    reasoning:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.6
      max_tokens: 12288
      task_types:
        - derivation
        - derivation_review
        - analysis
        - proof_planning
        - blueprint_generation
        - decomposition_review
        - literature_review
        - proof_formulation_review
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false

    control:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.1
      max_tokens: 4096
      task_types:
        - planning
        - task_analysis
        - literature_planning
        - proof_formulation
        - experiment_review
        - experiment_protocol
        - experiment_patch
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false

    coding:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.1
      max_tokens: 12288
      task_types:
        - experiment_design
        - experiment_revision
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false

    format:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.1
      max_tokens: 8192
      task_types:
        - literature_extraction
      extra_body:
        top_p: 0.8
        top_k: 20
        min_p: 0.0
        # Qwen notes that high presence penalties can cause language mixing.
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false

    proof:
      model: qwen-research
      base_url: http://localhost:8000/v1
      api_key: EMPTY
      temperature: 0.6
      max_tokens: 8192
      task_types:
        - theorem_proving
        - proof_revision
        - sketch_generation
        - sketch_revision
      extra_body:
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: false

# Experiments execute one generated Python program in a resource-bounded container.
# There is no nested tool-calling coding agent.
experimenter:
  enabled: true
  image: tcs-agentic-research-experimenter:v2
  dockerfile: ""
  network: none
  memory: 4g
  cpus: 2
  timeout_seconds: 600
  max_output_bytes: 500000
  add_host_gateway: false
  environment: {}
